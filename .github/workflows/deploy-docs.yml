name: Deploy docs

# Builds the Fumadocs static export and publishes it into the repo's Pages.
#
# GitHub Pages for this repo serves from the `gh-pages` branch (root). Two
# things at the root of gh-pages are LIVE and must never be clobbered:
#   - appcast.xml  -> the Sparkle feed at /hindsight/appcast.xml
#   - index.html   -> the landing page at /hindsight/
# The built docs are published into gh-pages/docs/ (served at /hindsight/docs/);
# keep_files: true preserves everything else already on gh-pages, so the appcast
# and landing are left intact. The appcast itself is maintained by tools/release.sh.

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: write

# Never run two deploys at once; let an in-flight build finish.
concurrency:
  group: deploy-docs
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        # npm install (not ci): the lockfile is generated on macOS arm64, but the
        # runner is linux x64 and needs different optional native deps (@emnapi/*);
        # ci is strict and fails on that drift, install reconciles it.
        run: npm install --no-audit --no-fund

      - name: Build static export
        working-directory: docs-site
        run: npm run build

      - name: Publish to gh-pages/docs
        run: |
          set -euo pipefail
          git clone --branch gh-pages --depth 1 \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" ghp
          # Replace ONLY the docs/ subtree (clean, so stale paths don't linger).
          # appcast.xml, index.html, and .nojekyll at the gh-pages root are left untouched.
          rm -rf ghp/docs
          mkdir -p ghp/docs
          cp -R docs-site/out/. ghp/docs/
          cd ghp
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'docs: publish Fumadocs site to gh-pages/docs [skip ci]' || { echo 'no changes'; exit 0; }
          git push origin gh-pages
